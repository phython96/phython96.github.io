short_bio: >-
  <p><b>My dream is to witness the emergence of AGI and to contribute my efforts.</b></p>
  <p>I am currently a Deep Learning Researcher at <b>DeepSeek AI</b>, where I focus on <b>post-training large language models to strengthen their agentic capabilities</b>, with an emphasis on <b>coding agents</b>.
  I'm fascinated by how scalable training can turn a language model into an agent that reliably plans, acts, and self-corrects while solving real-world software engineering tasks.</p>
  <p>This builds on my doctoral research at <b>Peking University</b>, which centered on <b>multi-task agents operating within open-world settings</b>.
  As first author, I led the development of the <b>GROOT and ROCKET series</b>, empowering AI agents to follow human instructions and execute intricate tasks in Minecraft, consistently <b>pushing the frontiers of AI agent capabilities in 3D video games</b>.
  A core theme of this work was finding <b>task representations that are expressive, low-ambiguity, and scalable for efficient training</b> — a question that carries directly into building general coding agents today.</p>
  <p>Across both lines of work, I hold a strong belief that the <b>scalable generation and validation of tasks within digital worlds is currently the most viable route to achieving AGI</b>.</p>


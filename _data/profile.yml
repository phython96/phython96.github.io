short_bio: >-
  <p>I am currently a Deep Learning Researcher at <b>DeepSeek AI</b>, where I focus on post-training large language models to strengthen their agentic capabilities, with an emphasis on <b>coding agents</b>.
  The question I care about is how scalable training can turn a language model into an agent that reliably plans, acts, and self-corrects while solving real-world software engineering tasks.</p>
  <p>I am also deeply interested in <b>multimodal agents</b>, such as GUI agents and agents in 3D game worlds.
  This interest stems from my doctoral research at Peking University, where I worked on multi-task agents in open-world settings. As first author, I led the development of the <b>GROOT and ROCKET series</b>, empowering AI agents to follow human instructions and execute intricate tasks in Minecraft, consistently pushing the frontiers of AI agent capabilities in 3D video games.
  A core theme of this work was finding task representations that are expressive, low-ambiguity, and scalable for efficient training.</p>


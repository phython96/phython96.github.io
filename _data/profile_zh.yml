short_bio: >-
  <p><b>我的梦想是见证 AGI 的诞生,并为之贡献一份力量。</b></p>
  <p>我目前是 <b>DeepSeek AI</b> 的 AGI 研究员,主要从事<b>大语言模型的后训练(post-training)以增强其智能体(agentic)能力</b>,重点方向是 <b>Coding Agent</b>。
  我着迷于:如何通过可扩展的训练,让语言模型成长为一个在解决真实软件工程任务时能够稳定地规划、执行并自我纠错的智能体。</p>
  <p>这一方向延续自我在<b>北京大学</b>的博士研究——围绕<b>开放世界环境中的多任务智能体</b>展开。
  作为第一作者,我主导了 <b>GROOT 与 ROCKET 系列</b>工作,让 AI 智能体能够遵循人类指令、在 Minecraft 中完成复杂任务,持续<b>推动 3D 游戏环境中智能体能力的前沿</b>。
  这项工作的一个核心主题是寻找<b>兼具高表达力、低歧义、且可扩展用于高效训练的任务表征</b>——而这一问题恰恰直接延伸到了今天构建通用 Coding Agent 的实践中。</p>
  <p>纵观这两段工作,我始终坚信:<b>在数字世界中可扩展地生成与验证任务,是当前通往 AGI 最可行的路径</b>。</p>
  <p><b>研究兴趣</b>:LLM 智能体、Coding Agent、后训练与强化学习、机器学习、具身智能</p>


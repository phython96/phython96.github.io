short_bio_text_justify: false
short_bio: >-
  <p>我目前是 <b>DeepSeek AI</b> 的深度学习研究员,主要从事大语言模型的后训练以增强其智能体能力,重点方向是<b>代码智能体</b>。
  我关心的问题是:如何通过可扩展的训练,让语言模型成长为一个在解决真实软件工程任务时能够稳定地规划、执行并自我纠错的智能体。</p>
  <p>我同样对<b>多模态智能体</b>抱有浓厚的兴趣,例如 GUI 智能体,以及 3D 游戏世界中的智能体。
  这份兴趣源自我在北京大学的博士研究:我围绕开放世界环境中的多任务智能体展开工作,作为第一作者主导了 <b>GROOT 与 ROCKET 系列</b>,让 AI 智能体能够遵循人类指令、在 Minecraft 中完成复杂任务,持续推动 3D 游戏环境中智能体能力的前沿。
  其中一个核心主题是寻找兼具高表达力、低歧义、且可扩展用于高效训练的任务表征。</p>


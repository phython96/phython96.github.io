<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-label="Cai character watermark">
  <defs>
    <linearGradient id="markGradient" x1="110" y1="82" x2="410" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <filter id="softInk" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.18"/>
    </filter>
  </defs>

  <rect x="84" y="64" width="352" height="392" rx="18"
        fill="none"
        stroke="url(#markGradient)"
        stroke-width="10"
        opacity="0.34"/>
  <rect x="108" y="88" width="304" height="344" rx="8"
        fill="none"
        stroke="url(#markGradient)"
        stroke-width="2.5"
        stroke-dasharray="12 12"
        opacity="0.22"/>

  <text x="260" y="358"
        text-anchor="middle"
        font-family="STKaiti, KaiTi, Kaiti SC, Songti SC, Noto Serif CJK SC, serif"
        font-size="274"
        font-weight="700"
        fill="none"
        stroke="url(#markGradient)"
        stroke-width="6"
        stroke-linejoin="round"
        opacity="0.82"
        filter="url(#softInk)">蔡</text>
</svg>
